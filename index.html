<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>釜山五日行程 Pro Max</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2563eb;
  --bg:#f3f6fb;
  --card:#ffffff;
  --text:#111827;
  --sub:#6b7280;
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Noto Sans TC',sans-serif;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  color:var(--text);
}
.container{max-width:900px;margin:auto;padding:20px}

.hero{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
.hero img{width:100%;height:260px;object-fit:cover;filter:brightness(.6)}
.hero-content{position:absolute;bottom:20px;left:20px;color:#fff}
.hero h1{font-size:30px}
.hero p{font-size:14px;opacity:.9}

.tabs{display:flex;gap:10px;overflow:auto;margin-bottom:20px}
.tab{padding:10px 16px;border-radius:999px;background:#e5e7eb;cursor:pointer;font-size:13px;white-space:nowrap}
.tab.active{background:var(--primary);color:#fff}

.panel{display:none;animation:fade .4s}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

.card{background:var(--card);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.08);cursor:pointer;transition:.25s}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:16px}
.time{font-size:12px;color:var(--sub)}
.title{font-size:17px;font-weight:600;margin-top:4px}
.detail{margin-top:10px;font-size:13px;color:var(--sub);display:none;line-height:1.6}
.card.open .detail{display:block}

.actions{margin-top:10px;display:flex;gap:10px}
.btn{font-size:12px;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;text-decoration:none}

.footer{text-align:center;margin-top:30px;color:var(--sub);font-size:12px}
</style>
</head>
<body>
<div class="container">

<div class="hero">
<img src="https://images.unsplash.com/photo-1580651315530-69c8e0026377" />
<div class="hero-content">
<h1>釜山五日深度旅行</h1>
<p>完整行程 · 地圖導航 · 真實景點</p>
</div>
</div>

<div class="tabs">
<div class="tab active" onclick="sw(0)">D1</div>
<div class="tab" onclick="sw(1)">D2</div>
<div class="tab" onclick="sw(2)">D3</div>
<div class="tab" onclick="sw(3)">D4</div>
<div class="tab" onclick="sw(4)">D5</div>
</div>

<!-- DAY1 -->
<div class="panel active">

<div class="card" onclick="tog(this)">
<img src="https://images.unsplash.com/photo-1502920917128-1aa500764ce7"/>
<div class="card-body">
<div class="time">08:00</div>
<div class="title">台中 → 桃園機場</div>
<div class="detail">包車前往機場，旅程開始 ✈</div>
<div class="actions">
<a class="btn" href="https://maps.google.com/?q=桃園機場" target="_blank">📍地圖</a>
</div>
</div>
</div>

<div class="card" onclick="tog(this)">
<img src="https://images.unsplash.com/photo-1604908176997-431c37c1d75d"/>

<a class="btn" href="https://maps.google.com/?q=밀양돼지국밥 해운대" target="_blank">📍地圖</a>
</div>
</div>
</div>

</div>

</div>
</div>

</div>

</div>
</div>

<!-- DAY4 -->
<div class="panel">
<div class="card" onclick="tog(this)">
<img src="https://images.unsplash.com/photo-1528909514045-2fa4ac7a08ba"/>
<div class="card-body">

<div class="panel">
<div class="card" onclick="tog(this)">
<img src="https://images.unsplash.com/photo-1506012787146-f92b2d7d6d96"/>
<div class="card-body">

</div>

<div class="footer">Pro Max 行程 · 可直接分享使用</div>

</div>

<script>
function sw(i){
 document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
 document.querySelectorAll('.panel').forEach((p,idx)=>p.classList.toggle('active',idx===i));
}
function tog(el){el.classList.toggle('open')}
</script>

</body>
</html>
